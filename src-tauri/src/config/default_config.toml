# vibe-term configuration
#
# This file is read at startup and watched at runtime: any change you save
# here is hot-reloaded into the running app (theme switch, font tweaks, hotkey
# rebinding, etc.) without requiring a restart.
#
# Sections are tolerant to missing fields — anything you delete falls back to
# the built-in default below. Keys are camelCase (they mirror the IPC payload
# the frontend reads/writes 1:1).

[general]
# defaultShell = "/usr/bin/zsh"   # absolute path; defaults to the best detected shell
# workingDirectory = "/home/me"   # defaults to $HOME / %USERPROFILE%
scrollbackLines = 10000
confirmOnClose = true

[appearance]
theme = "dark"                    # "dark" | "light" | "dracula" | "nord" | "tokyo-night"
fontFamily = "JetBrains Mono"
fontSize = 13
lineHeight = 1.0
cursorStyle = "block"             # "block" | "bar" | "underline"
cursorBlink = true

[ai]
provider = "anthropic"            # "anthropic" | "groq" | "mistral" | "cerebras" | "deepseek"
model = "claude-opus-4-7"
maxContextBlocks = 5
autoSummarizeThresholdTokens = 150000

[terminal]
bell = true
copyOnSelect = false
rightClickPaste = true

[hotkeys]
new_tab = "Ctrl+T"
close_tab = "Ctrl+W"
split_horizontal = "Ctrl+Shift+D"
split_vertical = "Ctrl+Shift+E"
toggle_ai_panel = "Ctrl+I"
search_history = "Ctrl+R"
screenshot_region = "Ctrl+Alt+S"
screenshot_full = "Ctrl+Alt+F"
command_palette = "Ctrl+K"
open_settings = "Ctrl+,"
