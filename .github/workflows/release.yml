name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    name: create draft release
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  build-and-upload:
    needs: create-release
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - label: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - label: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - label: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev patchelf
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    needs: build-and-upload
    runs-on: ubuntu-24.04
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.rest.repos.listReleases({ owner, repo });
            const draft = releases.data.find(r => r.tag_name === '${{ github.ref_name }}');
            if (draft && draft.draft) {
              await github.rest.repos.updateRelease({
                owner, repo, release_id: draft.id, draft: false,
              });
              console.log(`Published release ${draft.tag_name}`);
            }
